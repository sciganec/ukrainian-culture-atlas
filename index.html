<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Атлас української культури | SUBIT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>📖 Атлас української культури</h1>
        <p>64 архетипи за системою <strong>SUBIT</strong> – WHO × WHERE × WHEN</p>
    </header>
    <div class="grid-container" id="grid"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title"></h2>
            <p id="modal-trigram" class="trigram"></p>
            <p id="modal-desc"></p>
            <div id="modal-fields"></div>
            <div id="modal-representatives"></div>
            <div id="modal-works"></div>
            <div id="modal-links"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
